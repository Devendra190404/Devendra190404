name: Daily Activity Update

on:
  schedule:
    # Runs daily at 00:05 AM IST (18:35 UTC)
    - cron: "35 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create random daily commits (1-15)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p activity

          COMMIT_COUNT=$((RANDOM % 15 + 1))
          DATE=$(date -u +%Y-%m-%d)

          echo "Creating $COMMIT_COUNT commit(s) for $DATE"

          git config user.name "Devendra190404"
          git config user.email "72194247+Devendra190404@users.noreply.github.com"

          for i in $(seq 1 "$COMMIT_COUNT"); do
            echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') — Daily profile activity update #$i of $COMMIT_COUNT" >> activity/activity.log
            git add activity/activity.log
            git commit -m "chore: daily activity update $DATE ($i/$COMMIT_COUNT)"
          done

          git push "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
