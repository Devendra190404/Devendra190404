name: Daily Activity Update

on:
  schedule:
    # Runs daily at 00:05 AM IST (18:35 UTC)
    - cron: "35 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Append daily activity entry
        run: |
          mkdir -p activity
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') — Daily profile activity update" >> activity/activity.log

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily activity update $(date -u +%Y-%m-%d)"
          commit_author: Devendra Kumar Sahu <72194247+Devendra190404@users.noreply.github.com>
          commit_user_name: Devendra190404
          commit_user_email: 72194247+Devendra190404@users.noreply.github.com
          file_pattern: activity/activity.log
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
